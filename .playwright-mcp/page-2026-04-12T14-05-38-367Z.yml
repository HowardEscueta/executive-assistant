          - generic [ref=e658]:
            - link "We run a seven-figure agency with zero project managers. Not because we hate project managers. Because we realised 80% of that job is just scanning and updating. Reading emails. Copying info into a task list. Chasing people for updates. Writing a report about what happened. That's not project management. That's a human database. The real job is the conversations. The decisions. The relationships. The judgment calls. So we're building an AI that handles the scanning and updating. Every morning it reads every email, every message, every meeting note. Then it tells the team exactly what to do. Nobody tracks anything manually. Nobody misses a deadline. Nobody spends 6 hours on admin. We're not done yet. We're building it right now. But the thinking behind it already changed everything. Comment WEBINAR and I'll send you the link to watch me walk through the whole system live. Carousel" [ref=e660] [cursor=pointer]:
